syntax = "proto3";

// https://developers.google.com/protocol-buffers/docs/style

package impresso.query;

enum FilterContext {
  CONTEXT_UNSPECIFIED = 0;
  CONTEXT_INCLUDE = 1;
  CONTEXT_EXCLUDE = 2;
}

enum FilterOperator {
  OPERATOR_UNSPECIFIED = 0;
  OPERATOR_AND = 1;
  OPERATOR_OR = 2;
}

enum FilterType {
  // legacy types below:
  // 30 - MENTION_FUNCTION (not used anymore)
  reserved 30;

  // used and deprecated types below:

  // Applies to: content item
  TYPE_UNSPECIFIED = 0;
  TYPE_UID = 1 [deprecated = true]; // legacy. Remove soon.
  TYPE_HAS_TEXT_CONTENTS = 2; // type:boolean Usually implicitly added in the web app
  TYPE_TITLE = 3; // type:string
  TYPE_IS_FRONT = 4; // type:boolean
  TYPE_PAGE = 5; // type:number
  TYPE_ISSUE = 6 [deprecated = true]; // legacy. may still be used internally
  TYPE_STRING = 7; // type:string
  TYPE_ENTITY = 8 [deprecated = true]; // legacy. superceded by more specific entity types (person, location, nag, organisation)
  TYPE_NEWSPAPER = 9 [deprecated = true]; // legacy. Alias to MEDIA_SOURCE type
  TYPE_DATERANGE = 10; // type:daterange
  TYPE_YEAR = 11; // type:number
  TYPE_LANGUAGE = 12; // type:string
  TYPE_TYPE = 13; // type:string
  TYPE_REGEX = 14 [deprecated = true]; // legacy.
  TYPE_MENTION = 15; // type:string
  TYPE_PERSON = 16; // type:string
  TYPE_LOCATION = 17; // type:string
  TYPE_TOPIC = 18; // type:string
  TYPE_COLLECTION = 19; // type:string
  TYPE_OCR_QUALITY = 20; // type:numericRange
  TYPE_CONTENT_LENGTH = 21; // type:number
  TYPE_COUNTRY = 22; // type:string
  TYPE_ACCESS_RIGHT = 23 [deprecated = true]; // legacy. Use COPYRIGHT
  TYPE_PARTNER = 24; // type:string
  TYPE_MONTH = 25; // type:number

  // Applies to: text reuse
  TYPE_TEXT_REUSE_CLUSTER_SIZE = 26; // type:number
  TYPE_TEXT_REUSE_CLUSTER_LEXICAL_OVERLAP = 27; // type:numericRange
  TYPE_TEXT_REUSE_CLUSTER_DAY_DELTA = 28; // type:numericRange

  // Applies to: content item
  TYPE_TEXT_REUSE_CLUSTER = 29; // type:string cluster in articles

  // Applies to: content item
  TYPE_NAG = 31; // type:string Newsagency

  // Applies to: entities
  TYPE_WIKIDATA_ID = 32; // type:string

  // Applies to: content item
  TYPE_DATA_DOMAIN = 33 [deprecated = true]; // Use COPYRIGHT
  TYPE_COPYRIGHT = 34; // type:string
  TYPE_SOURCE_TYPE = 35; // type:string
  TYPE_SOURCE_MEDIUM = 36; // type:string

  // Applies to: content item
  TYPE_ORGANISATION = 37; // type:string

  // Applies to: content item, images
  TYPE_EMBEDDING = 38; // type:string

  // Applies to: images
  TYPE_IMAGE_VISUAL_CONTENT = 39; // type:string
  TYPE_IMAGE_TECHNIQUE = 40; // type:string
  TYPE_IMAGE_COMMUNICATION_GOAL = 41; // type:string
  TYPE_IMAGE_CONTENT_TYPE = 42; // type:string

  // Applies to: text reuse passages
  TYPE_CONTENT_ITEM_ID = 43; // type:string

  // Applies to: content item
  TYPE_MEDIA_SOURCE = 44; // type:string
}

enum FilterPrecision {
  PRECISION_UNSPECIFIED = 0;
  PRECISION_EXACT = 1;
  PRECISION_PARTIAL = 2;
  PRECISION_FUZZY = 3;
  PRECISION_SOFT = 4;
}

message DateRange {
  // https://developers.google.com/protocol-buffers/docs/encoding#signed-integers
  sint64 from = 1; // UNIX timestamp
  sint64 to = 2; // UNIX timestamp
}

message Filter {
  FilterContext context = 1;
  FilterOperator op = 2;
  FilterType type = 3;
  FilterPrecision precision = 4;
  repeated string q = 5;
  DateRange daterange = 6 [deprecated=true]; // not used anymore, q is used instead
  repeated string uids = 7;
}

enum GroupValue {
  GROUPVALUE_UNSPECIFIED = 0;
  GROUPVALUE_ARTICLES = 1;
}

message SearchQuery {
  repeated Filter filters = 1;
  GroupValue group_by = 2;
}

// Collection Recommender

message CollectionRecommenderParameter {
  enum RecommenderParameterId {
    ID_UNSPECIFIED = 0;
    ID_COUNT_TYPE = 1;
    ID_MIN_OCCURRENCES = 2;
    ID_NUMBER_TO_KEEP = 3;
    ID_REMOVE_FULLY_MENTIONED = 4;
    ID_NORMALIZE_MAX_SCORE = 5;
    ID_MARGIN = 6;
    ID_SCALING_FACTOR = 7;
  }
  
  RecommenderParameterId key = 1;
  string string_value = 2;
  sint32 number_value = 3;
  bool bool_value = 4;
}

message CollectionRecommender {
  enum RecommenderType {
    TYPE_UNSPECIFIED = 0;
    TYPE_TIME_RANGE = 1;
    TYPE_ENTITIES = 2;
    TYPE_TOPICS = 3;
    TYPE_TEXT_REUSE_CLUSTERS = 4;
  }
  RecommenderType type = 1;
  sint32 weight = 2;
  repeated CollectionRecommenderParameter parameters = 3;
  bool enabled = 4;
}

message CollectionRecommendersSettings {
  repeated CollectionRecommender recommenders = 1;
}
